<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProposalMate Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div class="logo">ProposalMate</div>
        <div class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../pages/features.html">Features</a>
          <a href="../pages/pricing.html">Pricing</a>
          <a href="../pages/about.html">About</a>
          <a href="../pages/signup.html" class="btn btn-primary">Sign Up</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="dashboard">
    <aside class="sidebar">
      <h2>Welcome <span id="user-name">John</span></h2>
      <ul>
        <li><a href="#" class="dashboard-link">Dashboard</a></li>
        <li><a href="create.html" class="dashboard-link">Create New Proposal</a></li>
        <li><a href="#" class="dashboard-link">My Proposals</a></li>
        <li><a href="#" class="dashboard-link">Clients</a></li>
        <li><a href="#" class="dashboard-link">Account Settings</a></li>
        <li><a href="#" class="dashboard-link">Subscription</a></li>
        <li><a href="../index.html" class="dashboard-link">Logout</a></li>
      </ul>
    </aside>

    <section class="dashboard-main">
      <div class="dashboard-stats">
        <div class="stat-card">
          <h3>Total Proposals</h3>
          <p class="stat-totalProposals">0</p>
        </div>
        <div class="stat-card">
          <h3>Sent</h3>
          <p class="stat-sentProposals">0</p>
        </div>
        <div class="stat-card">
          <h3>Viewed</h3>
          <p class="stat-viewedProposals">0</p>
        </div>
        <div class="stat-card">
          <h3>Accepted</h3>
          <p class="stat-acceptedProposals">0</p>
        </div>
      </div>

      <div id="proposal-status-chart" class="chart-container"></div>

      <div class="proposal-list">
        <!-- Proposals will be dynamically injected here -->
      </div>
    </section>
  </main>

  <!-- Using the consolidated dashboard.js script with the correct path -->
  <script src="../js/dashboard.js"></script>
</body>
</html>
