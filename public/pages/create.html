<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create New Proposal</title>
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="dashboard">

  <header>
    <h1>Create New Proposal</h1>
    <a href="dashboard.html">← Back to Dashboard</a>
  </header>

  <main class="container">
    <form id="create-proposal-form" class="form">
      <div class="form-group">
        <label for="proposal-title">Proposal Title</label>
        <input type="text" id="proposal-title" name="title" required />
      </div>

      <div class="form-group">
        <label for="proposal-client">Client</label>
        <input type="text" id="proposal-client" name="client" required />
      </div>

      <div class="form-group">
        <label for="proposal-template">Template</label>
        <select id="proposal-template" name="template" required>
          <option value="">Select a template</option>
          <option value="basic">Basic Proposal</option>
          <option value="marketing">Marketing Campaign</option>
          <option value="webdesign">Web Design</option>
        </select>
      </div>

      <div class="form-group">
        <label for="proposal-due-date">Due Date</label>
        <input type="date" id="proposal-due-date" name="dueDate" />
      </div>

      <button type="submit" class="btn btn-primary">Create Proposal</button>
    </form>
  </main>

  <script src="../js/main.js"></script>
</body>
</html>
